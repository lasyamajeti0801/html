<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Webpage</title>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Welcome to My Website</h1>
    <nav>
      <a href="#home">Home</a> |
      <a href="#about">About</a> |
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main>
    <!-- Section -->
    <section id="home">
      <h2>Home Section</h2>
      <p>This is the home section of my webpage.</p>
    </section>

    <!-- Article -->
    <article>
      <h2>Latest Article</h2>
      <p>This is an independent article that could stand on its own.</p>
    </article>

    <!-- Aside -->
    <aside>
      <h3>Related Info</h3>
      <p>Here are some extra details, links, or ads.</p>
    </aside>
  </main>

  <!-- Footer -->
  <footer>
    <p> 2025 My Website</p>
  </footer>

</body>
</html>
