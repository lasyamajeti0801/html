<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Assignment</title>
</head>
<body>
    <!-- Heading -->
    <h1>My Sample HTML Page</h1>
    <hr>

    <!-- Paragraph with line break -->
    <p>
        This is a sample paragraph.<br>
        Here is a new line after line break.<br>
        HTML is fun to learn!
    </p>
    <hr>

    <!-- Image as a link -->
    <a href="https://www.youtube.com/" target="_blank">
        <img src="https://tse2.mm.bing.net/th/id/OIP.kA13Itmxev0ytEqrJf_f1gHaHa?pid=Api&P=0&h=180" alt="Sample Image" height="300">
    </a>
    <hr>

    <!-- Text formatting in one line -->
    <p>
        <b>Bold</b>, <i>Italic</i>, <u>Underline</u>, <s>Strikethrough</s>
    </p>
    <hr>

    <!-- Third equation of motion: v² = u² + 2as -->
    <p>
        Third equation of motion: v<sup>2</sup> = u<sup>2</sup> + 2as
    </p>
</body>
</html>
